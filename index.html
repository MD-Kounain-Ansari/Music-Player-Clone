<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utility.css" />
  </head>
  <body>
    <div class="container flex bg-black">
      <div class="left">
        <div class="close">
          <img class="invert" src="images/close.svg" alt="">
        </div>
        <div class="home bg-grey rounded m-1 p-1">
          <div class="logo"><img width="110" class="invert" src="images/logo.svg" alt="" /></div>
          <ul>
            <li><img class="invert" src="images/home.svg" alt="" /> Home</li>
            <li><img class="invert" src="images/search.svg" alt="" /> Search</li>
          </ul>
        </div>

        <div class="library bg-grey rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="images/playlist.svg" alt="" />
            <h2>Your Library</h2>
            </div>
            <div class="songList">
            <ul>
               
            </ul>
            </div>
          
          <div class="footer">
            <div><a href="#"><span>Legal</span></a></div>
            <div><a href="#"><span>Privacy Center</span></a></div>
            <div><a href="#"><span>Privacy Policy</span></a></div>
            <div><a href="#"><span>Cookies</span></a></div>
            <div><a href="#"><span>About Ads</span></a></div>
            <div><a href="#"><span>Accessibility</span></a></div>
        </div>
        </div>
        
      </div>

      <div class="right bg-grey rounded ">
        <div class="header">
            <div class="nav">
              <div class = " hamburgerContainer ">
              <img class="invert hamburger" src="images/hamburger.svg" alt="">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"  stroke-linejoin="round" />
                        </svg>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        </div>
            </div>
            <div class="buttons">
                <button class="signupBtn">Sign up</button>
                <button class="loginBtn">Log in</button>
            </div>
            </div>
            <div class="spotifyPlaylists">
                <h1>Trending Songs</h1>
                <div class="cardContainer">
                    <div class="card">
                        <div class="play">
                            <svg width="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">  <path d="M5 20V4L19 12L5 20Z" stroke="#141B34" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <img  src="https://i.scdn.co/image/ab67616d00001e029aa819fdf84c78fc1976391d"  alt=""">
                        <h2>KALYANI (with Shreya Ghoshal) - Remix</h2>
                        <p>ARJN , KDS , FIFTY4 , Shreya Ghoshal</p>
                    </div>



                     <div class="card">
                        <div class="play">
                            <svg width="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">  <path d="M5 20V4L19 12L5 20Z" stroke="#141B34" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <img  src="https://i.scdn.co/image/ab67616d0000b273be6eefb59eac2f121e87c99f"  alt=""">
                        <h2>Tarefaan</h2>
                        <p>Karan Aujla , Divine</p>
                    </div>

                    <div class="card">
                        <div class="play">
                            <svg width="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">  <path d="M5 20V4L19 12L5 20Z" stroke="#141B34" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <img  src="https://i.scdn.co/image/ab67616d00001e0221d6e1053df28c5a33208c1a"  alt=""">
                        <h2>Udi Udi</h2>
                        <p>Aneesh , Sarkar , Hruday </p>
                    </div>

                    <div class="card">
                        <div class="play">
                            <svg width="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">  <path d="M5 20V4L19 12L5 20Z" stroke="#141B34" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <img  src="https://i.scdn.co/image/ab67616d0000b273351d049d0758d0cec935c518"  alt=""">
                        <h2>Knightridah</h2>
                        <p>Imran Khan </p>
                    </div>
                   

                </div>
                <div class="playbar">
                  <div class="seekbar">
                    <div class="circle">

                    </div>
                  </div>
                  <div class="timeline">
                    <div class="songinfo">

                    </div>
                    <div class="songbuttons">
                        <img width="35" id="prev" src="images/prev.svg" alt="">
                        <img width="35" id="play" src="images/play.svg" alt="">
                        <img width="35" id="next" src="images/next.svg" alt="">
                    </div>
                    <div class="timeVol">
                    <div class="songtime">

                 </div>
                 <div class="volume">
                  <img width="30" src="images/volume.svg" alt="">
                  <div class="range">
                    <input type="range" name="volume">
                  </div>
                </div>
                 </div>
                 </div>
             </div>
          </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
